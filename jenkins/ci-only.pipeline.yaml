# Jenkins CI pipeline for GitOps-style delivery
# - CI: lint/test/build + docker image build/push
# - GitOps handoff: update Helm values image tag and push commit
# - CD rollout: handled by ArgoCD
pipeline:
  agent:
    label: docker

  options:
    - timestamps
    - disableConcurrentBuilds

  environment:
    IMAGE_REPO: ghcr.io/seung-ju/portfolio
    HELM_VALUES_FILE: helm/portfolio/values-prod.yaml
    DOCKER_BUILDKIT: "1"

  stages:
    - stage: Checkout
      steps:
        - checkout: scm

    - stage: Setup
      steps:
        - sh: |
            set -eu
            corepack enable
            node --version
            pnpm --version

    - stage: Install
      steps:
        - sh: |
            set -eu
            pnpm install --frozen-lockfile

    - stage: Verify
      steps:
        - sh: |
            set -eu
            pnpm prisma:generate
            pnpm lint
            pnpm test
            pnpm build

    - stage: Docker Build
      steps:
        - withCredentials:
            - string:
                credentialsId: sentry-auth-token
                variable: SENTRY_AUTH_TOKEN
        - sh: |
            set -eu
            SHORT_SHA="$(echo "${GIT_COMMIT:-local}" | cut -c1-7)"
            SAFE_BRANCH="$(echo "${BRANCH_NAME:-local}" | tr '/' '-')"
            IMAGE_TAG="${SAFE_BRANCH}-${BUILD_NUMBER}-${SHORT_SHA}"
            echo "IMAGE_TAG=${IMAGE_TAG}" > image.env
            docker build \
              --build-arg SENTRY_AUTH_TOKEN="${SENTRY_AUTH_TOKEN}" \
              -t "${IMAGE_REPO}:${IMAGE_TAG}" \
              -t "${IMAGE_REPO}:ci-latest" \
              .

    - stage: Docker Push
      steps:
        - withCredentials:
            - usernamePassword:
                credentialsId: ghcr-credentials
                usernameVariable: REGISTRY_USER
                passwordVariable: REGISTRY_TOKEN
        - sh: |
            set -eu
            . ./image.env
            echo "${REGISTRY_TOKEN}" | docker login ghcr.io -u "${REGISTRY_USER}" --password-stdin
            docker push "${IMAGE_REPO}:${IMAGE_TAG}"
            docker push "${IMAGE_REPO}:ci-latest"
            docker logout ghcr.io

    - stage: Update Helm Tag Commit
      steps:
        - withCredentials:
            - usernamePassword:
                credentialsId: git-push-credentials
                usernameVariable: GIT_PUSH_USER
                passwordVariable: GIT_PUSH_TOKEN
        - sh: |
            set -eu
            . ./image.env

            git config user.name "Jenkins"
            git config user.email "no-reply@jenkins.seung-ju.com"

            perl -0pi -e 's/(tag:\s*").*(")/$1'"${IMAGE_TAG}"'$2/' "${HELM_VALUES_FILE}"

            if git diff --quiet -- "${HELM_VALUES_FILE}"; then
              echo "No Helm values changes to commit."
              exit 0
            fi

            git add "${HELM_VALUES_FILE}"
            git commit -m "ci: update portfolio image tag to ${IMAGE_TAG} [skip ci]"

            ORIGIN_URL="$(git remote get-url origin)"
            case "${ORIGIN_URL}" in
              https://*)
                AUTH_URL="https://${GIT_PUSH_USER}:${GIT_PUSH_TOKEN}@${ORIGIN_URL#https://}"
                ;;
              *)
                echo "Unsupported origin URL for push: ${ORIGIN_URL}"
                exit 1
                ;;
            esac

            TARGET_BRANCH="${BRANCH_NAME:-main}"
            git push "${AUTH_URL}" "HEAD:${TARGET_BRANCH}"

  post:
    always:
      - archiveArtifacts:
          artifacts: image.env
          allowEmptyArchive: true
