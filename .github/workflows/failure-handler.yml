name: Failure Handler

on:
  workflow_run:
    workflows:
      - CI/CD
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  handle-failure:
    name: Create failure issue
    if: ${{ contains(fromJSON('["failure","timed_out","action_required"]'), github.event.workflow_run.conclusion) }}
    runs-on: ubuntu-latest
    steps:
      - name: Collect failed jobs
        id: failed
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100
              }
            );

            const failed = jobs
              .filter((job) => ["failure", "timed_out", "cancelled", "action_required"].includes(job.conclusion))
              .map((job) => `- ${job.name} (${job.conclusion})`)
              .join("\n");

            core.setOutput("failed_jobs", failed || "- (No failed job details available)");

      - name: Create issue
        uses: actions/github-script@v7
        env:
          FAILED_JOBS: ${{ steps.failed.outputs.failed_jobs }}
        with:
          script: |
            const run = context.payload.workflow_run;
            const failedJobs = process.env.FAILED_JOBS || "- (No failed job details available)";

            const title = `[CI Failure] ${run.name} #${run.run_number} (${run.head_branch})`;
            const body = [
              "CI workflow failed and needs attention.",
              "",
              `- Workflow: ${run.name}`,
              `- Conclusion: ${run.conclusion}`,
              `- Branch: ${run.head_branch}`,
              `- SHA: ${run.head_sha}`,
              `- Actor: ${run.actor?.login ?? "unknown"}`,
              `- Run URL: ${run.html_url}`,
              "",
              "Failed jobs:",
              failedJobs,
              "",
              "Please investigate logs and apply a fix."
            ].join("\n");

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Apply only labels that already exist in the repo to avoid validation errors.
            const preferredLabels = ["ci", "bug", "automation"];
            const existingLabels = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              { owner, repo, per_page: 100 }
            );
            const existingNames = new Set(existingLabels.map((label) => label.name));
            const labels = preferredLabels.filter((label) => existingNames.has(label));

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels
            });
