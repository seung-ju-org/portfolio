name: CI/CD

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["**"]
    paths-ignore:
      - "helm/portfolio/values.yaml"
  workflow_dispatch:

concurrency:
  group: portfolio-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REPO: ghcr.io/seung-ju-org/portfolio
  HELM_VALUES_FILE: helm/portfolio/values.yaml

jobs:
  verify:
    name: Verify (lint/test/build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: |
          pnpm prisma:generate
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

  publish:
    name: Build, Push Image, Update Helm Tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="main-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_REPO }}:ci-latest
            ${{ env.IMAGE_REPO }}:latest

      - name: Update Helm image tag
        run: |
          perl -0pi -e 's/(tag:\s*").*(")/$1'"${{ steps.meta.outputs.image_tag }}"'$2/' "${HELM_VALUES_FILE}"

      - name: Commit and push Helm tag
        run: |
          if git diff --quiet -- "${HELM_VALUES_FILE}"; then
            echo "No helm tag changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${HELM_VALUES_FILE}"
          git commit -m "ci: update portfolio image tag to ${{ steps.meta.outputs.image_tag }} [skip ci]"
          git push origin HEAD:main
